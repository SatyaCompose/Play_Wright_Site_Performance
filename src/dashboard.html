<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>⚡ Site Audit</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090c;
            --s1: #111216;
            --s2: #18191f;
            --s3: #22242c;
            --border: #2a2d38;
            --text: #e2e4f0;
            --muted: #5a5f75;
            --accent: #7c6dff;
            --good: #22c76e;
            --warn: #f5a623;
            --poor: #f0435a;
            --running: #38bdf8;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            height: 100vh;
            display: grid;
            grid-template-rows: 52px 1fr;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            background: var(--s1);
            flex-shrink: 0;
        }

        .logo {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .hstats {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
        }

        .pill {
            font-family: var(--mono);
            font-size: 10px;
            padding: 2px 9px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .pill.g {
            border-color: rgba(34, 199, 110, .3);
            color: var(--good);
            background: rgba(34, 199, 110, .07);
        }

        .pill.b {
            border-color: rgba(240, 67, 90, .3);
            color: var(--poor);
            background: rgba(240, 67, 90, .07);
        }

        .pill.r {
            border-color: rgba(56, 189, 248, .3);
            color: var(--running);
            background: rgba(56, 189, 248, .07);
        }

        .pw {
            width: 140px;
            height: 3px;
            background: var(--s3);
            border-radius: 3px;
            overflow: hidden;
        }

        .pf {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width .3s;
        }

        /* ── Layout ── */
        .layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100%;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sbt {
            display: flex;
            gap: 5px;
            padding: 7px 9px;
            border-bottom: 1px solid var(--border);
            background: var(--s1);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .sbt input {
            flex: 1;
            min-width: 110px;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 10px;
            padding: 4px 8px;
            outline: none;
        }

        .sbt input:focus {
            border-color: var(--accent);
        }

        .fb {
            background: var(--s2);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 5px;
            cursor: pointer;
        }

        .fb:hover,
        .fb.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124, 109, 255, .1);
        }

        .ul {
            flex: 1;
            overflow-y: auto;
        }

        .ul::-webkit-scrollbar {
            width: 3px;
        }

        .ul::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .ur {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 11px;
            border-bottom: 1px solid rgba(42, 45, 56, .4);
            cursor: pointer;
            transition: background .1s;
        }

        .ur:hover {
            background: var(--s2);
        }

        .ur.selected {
            background: rgba(124, 109, 255, .1);
            border-right: 2px solid var(--accent);
        }

        .ur.running {
            border-left: 2px solid var(--running);
            padding-left: 9px;
        }

        .ur.failed {
            border-left: 2px solid var(--poor);
            padding-left: 9px;
        }

        .sd {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .sd.pending {
            background: var(--border);
        }

        .sd.running {
            background: var(--running);
            animation: blink 1.2s ease-in-out infinite;
        }

        .sd.done {
            background: var(--good);
        }

        .sd.failed {
            background: var(--poor);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .4;
                transform: scale(.6);
            }
        }

        .up {
            font-family: var(--mono);
            font-size: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .ur.failed .up {
            color: var(--poor);
        }

        .ur.running .up {
            color: var(--running);
        }

        .rp {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        .rd {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border);
        }

        .rd.good {
            background: var(--good);
        }

        .rd.warn {
            background: var(--warn);
        }

        .rd.poor {
            background: var(--poor);
        }

        .rd.running {
            background: var(--running);
            animation: blink 1s ease-in-out infinite;
        }

        /* ── Detail panel ── */
        .detail {
            overflow-y: auto;
            background: var(--bg);
        }

        .detail::-webkit-scrollbar {
            width: 3px;
        }

        .detail::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .di {
            padding: 18px 20px;
        }

        .de {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            flex-direction: column;
            gap: 8px;
        }

        .de .big {
            font-size: 28px;
        }

        /* ── Device tabs ── */
        .dtabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 18px;
            overflow-x: auto;
        }

        .dtab {
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            white-space: nowrap;
            transition: color .15s;
        }

        .dtab:hover {
            color: var(--text);
        }

        .dtab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .dtab-eng {
            font-size: 8px;
            font-family: var(--mono);
            color: var(--muted);
            background: var(--s3);
            padding: 1px 4px;
            border-radius: 2px;
            margin-left: 4px;
        }

        .dtab-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border);
            vertical-align: middle;
            margin-left: 5px;
        }

        .dtab-dot.good {
            background: var(--good);
        }

        .dtab-dot.warn {
            background: var(--warn);
        }

        .dtab-dot.poor {
            background: var(--poor);
        }

        .dtab-dot.running {
            background: var(--running);
            animation: blink 1s ease-in-out infinite;
        }

        /* ── Vitals row ── */
        .vg {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 7px;
            margin-bottom: 18px;
        }

        .vc {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 11px 9px;
        }

        .vl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            margin-bottom: 3px;
        }

        .vv {
            font-family: var(--mono);
            font-size: 19px;
            font-weight: 600;
            line-height: 1;
        }

        .vs {
            font-size: 9px;
            color: var(--muted);
            margin-top: 2px;
        }

        .vgrade {
            font-size: 9px;
            font-weight: 600;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .gg {
            color: var(--good);
        }

        .gw {
            color: var(--warn);
        }

        .gp {
            color: var(--poor);
        }

        /* ── Compare bar ── */
        .cmpbar {
            margin-bottom: 16px;
        }

        .cmprow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .cmplbl {
            font-size: 10px;
            color: var(--muted);
            width: 140px;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cmptrack {
            flex: 1;
            height: 6px;
            background: var(--s3);
            border-radius: 3px;
            overflow: hidden;
        }

        .cmpfill {
            height: 100%;
            border-radius: 3px;
            transition: width .4s;
        }

        .cmpval {
            font-family: var(--mono);
            font-size: 10px;
            width: 60px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ═══════════════════════════════════════════════════════════
   DEVICE FRAMES
═══════════════════════════════════════════════════════════ */

        /* ── Shared frame area ── */
        .frame-area {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0 24px;
            margin-bottom: 16px;
            background: radial-gradient(ellipse at 50% 30%, rgba(124, 109, 255, .10) 0%, rgba(56, 189, 248, .04) 40%, transparent 75%);
            min-height: 500px;
        }

        /* ════════════════════════════
   iPhone 15 Pro
════════════════════════════ */
        .iphone-body {
            width: 320px;
            background: linear-gradient(160deg, #3a3a3f 0%, #1c1c1e 40%, #2a2a2e 100%);
            border-radius: 44px;
            border: 1px solid rgba(255, 255, 255, .12);
            outline: 1px solid rgba(0, 0, 0, .6);
            padding: 0;
            box-shadow:
                0 0 0 1.5px #111,
                0 0 0 2.5px rgba(255, 255, 255, .08),
                inset 0 1px 0 rgba(255, 255, 255, .15),
                0 32px 80px rgba(0, 0, 0, .7),
                0 8px 24px rgba(0, 0, 0, .5);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            overflow: hidden;
        }

        .iphone-notch {
            display: flex;
            justify-content: center;
            flex-shrink: 0;
            background: transparent;
            padding-top: 8px;
        }

        .iphone-statusbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 14px 0;
            font-family: var(--mono);
            color: rgba(255, 255, 255, .8);
            font-size: 7px;
            flex-shrink: 0;
        }

        .iphone-screen {
            margin: 4px 8px;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 393/659;
            flex-shrink: 0;
            position: relative;
            /* contain absolute video/img children */
            width: calc(100% - 16px);
            /* explicit width so aspect-ratio computes height */
        }

        .iphone-screen img,
        .iphone-screen video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        .iphone-homearea {
            display: flex;
            justify-content: center;
            padding: 8px 0 10px;
            flex-shrink: 0;
        }

        .iphone-bar {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, .3);
            border-radius: 2px;
        }

        /* Side buttons */
        .iphone-btn-right {
            position: absolute;
            background: linear-gradient(to right, #2a2a2e, #3a3a3f);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 2px;
        }

        .iphone-btn-right.top {
            right: -4px;
            top: 184px;
            width: 4px;
            height: 48px;
        }

        .iphone-btn-right.mid {
            right: -4px;
            top: 252px;
            width: 4px;
            height: 86px;
        }

        .iphone-btn-left {
            position: absolute;
            background: linear-gradient(to left, #2a2a2e, #3a3a3f);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 2px;
        }

        .iphone-btn-left.mute {
            left: -4px;
            top: 153px;
            width: 4px;
            height: 34px;
        }

        .iphone-btn-left.vol1 {
            left: -4px;
            top: 214px;
            width: 4px;
            height: 55px;
        }

        .iphone-btn-left.vol2 {
            left: -4px;
            top: 284px;
            width: 4px;
            height: 55px;
        }

        /* ════════════════════════════
   Pixel 7 Android
════════════════════════════ */
        .android-body {
            width: 300px;
            background: linear-gradient(160deg, #263238 0%, #1a2428 60%, #0f1a1e 100%);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, .08);
            outline: 1px solid rgba(0, 0, 0, .5);
            padding: 0;
            box-shadow:
                0 0 0 1.5px #0a0f12,
                0 0 0 2.5px rgba(255, 255, 255, .05),
                inset 0 1px 0 rgba(255, 255, 255, .08),
                0 32px 80px rgba(0, 0, 0, .7);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            overflow: hidden;
        }

        .android-topbar {
            display: flex;
            align-items: center;
            padding: 10px 14px 4px;
            flex-shrink: 0;
        }

        .android-cam {
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 40% 35%, #1a2428, #0a0f12);
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, .1);
            box-shadow: 0 0 0 1.5px rgba(56, 189, 248, .15);
            flex-shrink: 0;
        }

        .android-screen {
            margin: 0 8px;
            border-radius: 4px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 412/839;
            flex-shrink: 0;
            position: relative;
            width: calc(100% - 16px);
        }

        .android-screen img,
        .android-screen video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        .android-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            padding: 10px 0 12px;
            flex-shrink: 0;
        }

        .android-btn-right {
            position: absolute;
            background: linear-gradient(to right, #1a2428, #263238);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 2px;
        }

        .android-btn-right.pwr {
            right: -4px;
            top: 168px;
            width: 4px;
            height: 67px;
        }

        .android-btn-right.vol {
            right: -4px;
            top: 252px;
            width: 4px;
            height: 92px;
        }

        /* ════════════════════════════
   macOS Safari
════════════════════════════ */
        .frame-desktop {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .mac-chrome {
            width: 100%;
            background: linear-gradient(to bottom, #3a3c3f, #2d2f32);
            border-radius: 10px 10px 0 0;
            border: 1px solid rgba(255, 255, 255, .1);
            border-bottom: none;
        }

        .mac-titlebar {
            display: flex;
            align-items: center;
            padding: 8px 12px 0;
            gap: 8px;
        }

        .mac-dots {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .d-close {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #ff5f57;
            border: 1px solid rgba(0, 0, 0, .2);
            box-shadow: 0 0 0 0.5px rgba(0, 0, 0, .3);
        }

        .d-min {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #febc2e;
            border: 1px solid rgba(0, 0, 0, .2);
            box-shadow: 0 0 0 0.5px rgba(0, 0, 0, .3);
        }

        .d-max {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #28c840;
            border: 1px solid rgba(0, 0, 0, .2);
            box-shadow: 0 0 0 0.5px rgba(0, 0, 0, .3);
        }

        .mac-tabs {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 0;
            overflow: hidden;
        }

        .mac-tab {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px 6px 0 0;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 120px;
            max-width: 180px;
            border: 1px solid rgba(255, 255, 255, .06);
            border-bottom: none;
        }

        .mac-tab.active {
            background: #2d2f32;
            border-color: rgba(255, 255, 255, .1);
        }

        .mac-tab-title {
            font-size: 10px;
            color: rgba(255, 255, 255, .8);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .mac-tab-close {
            font-size: 9px;
            color: rgba(255, 255, 255, .3);
        }

        .mac-new-tab {
            font-size: 14px;
            color: rgba(255, 255, 255, .3);
            padding: 0 8px;
        }

        .mac-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px 8px;
            background: #2d2f32;
            border-top: 1px solid rgba(255, 255, 255, .06);
        }

        .mac-navbtns {
            display: flex;
            gap: 2px;
        }

        .mac-navbtns span {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255, 255, 255, .4);
            border-radius: 5px;
            cursor: default;
        }

        .mac-navbtns span:hover {
            background: rgba(255, 255, 255, .08);
        }

        .mac-urlbar {
            flex: 1;
            background: rgba(0, 0, 0, .25);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 7px;
            font-family: var(--mono);
            font-size: 10px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: rgba(255, 255, 255, .7);
        }

        .mac-actions {
            display: flex;
            gap: 2px;
        }

        .mac-actions span {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: rgba(255, 255, 255, .3);
            border-radius: 5px;
        }

        .browser-screen {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .06);
            border-top: none;
            border-radius: 0 0 8px 8px;
            aspect-ratio: 16/10;
            overflow: hidden;
        }

        .browser-screen img,
        .browser-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        .mac-stand-neck {
            width: 80px;
            height: 20px;
            background: linear-gradient(to bottom, #2a2c2f, #1e2022);
            border-left: 1px solid rgba(255, 255, 255, .05);
            border-right: 1px solid rgba(255, 255, 255, .05);
        }

        .mac-stand-base {
            width: 160px;
            height: 8px;
            background: linear-gradient(to bottom, #1e2022, #171a1c);
            border-radius: 0 0 6px 6px;
            border: 1px solid rgba(255, 255, 255, .05);
            border-top: none;
        }

        /* ════════════════════════════
   Windows Chrome
════════════════════════════ */
        .win-chrome {
            width: 100%;
            background: #202124;
            border-radius: 8px 8px 0 0;
            border: 1px solid #3a3d4a;
            border-bottom: none;
        }

        .win-titlebar {
            display: flex;
            align-items: stretch;
            height: 32px;
        }

        .win-tabstrip {
            flex: 1;
            display: flex;
            align-items: flex-end;
            padding: 0 4px;
            gap: 0;
            background: #202124;
            border-radius: 8px 0 0 0;
        }

        .win-tab {
            background: #2d2f31;
            border-radius: 6px 6px 0 0;
            padding: 0 10px;
            height: 26px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 130px;
            max-width: 180px;
            font-size: 10px;
            color: rgba(255, 255, 255, .75);
            border: 1px solid rgba(255, 255, 255, .06);
            border-bottom: none;
        }

        .win-tab.active {
            background: #35363a;
        }

        .win-favicon {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .win-tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .win-tab-x {
            font-size: 9px;
            color: rgba(255, 255, 255, .35);

        /* ── LIVE overlay (mobile only — desktop frames have their own chrome) ── */
        .live-badge {

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ── LIVE badge overlay ── */
        .live-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .live-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(240, 67, 90, .92);
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: .08em;
            padding: 2px 6px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #fff;
            animation: blink 1s ease-in-out infinite;
        }

        .loading-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, .04) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;

        @keyframes shimmer {

            }

        /* ── Section / table ── */
        .sec {

        .sechd {

            border: 1px solid rgba(124, 109, 255, .3);

<body>
    <header>
        <div class="logo">⚡ <span>Site</span> Audit</div>
        <div class="hstats">
            <span class="pill r" id="hr">0 running</span>
            <span class="pill g" id="hd">0 done</span>
            <span class="pill b" id="hf">0 failed</span>
            <div class="pw">
                <div class="pf" id="pb" style="width:0%"></div>
            </div>
            <span class="pill" id="ht" style="min-width:60px;text-align:center">0/0</span>
        </div>
    </header>
    <div class="layout">
        <div class="sidebar">
            <div class="sbt">
                <input id="search" type="text" placeholder="Filter URLs…" oninput="applyFilter()">
                <button class="fb active" onclick="setFilter('all',this)">All</button>
                <button class="fb" onclick="setFilter('running',this)">Live</button>
                <button class="fb" onclick="setFilter('poor',this)">Poor</button>
                <button class="fb" onclick="setFilter('failed',this)">Failed</button>
            </div>
            <div class="ul" id="ul"></div>
        </div>
        <div class="detail" id="detail">
            <div class="de">
                <div class="big">📡</div>
                <div id="cm">Connecting…</div>
            </div>
        </div>
    </div>
    <script>
        // ── State ─────────────────────────────────────────────────────────────────
        const S = new Map();   // url → AuditProgress
        const shots = new Map();   // url → { profileId: base64 }
        let selUrl = null;
        let selTab = null;
        let filterMode = 'all';
        let totalUrls = 0;
        let profiles = [];

        // ── Utils ─────────────────────────────────────────────────────────────────
        const pathOf = url => { try { return new URL(url).pathname || '/'; } catch { return url; } };
        const fmtMs = ms => ms ? ms.toLocaleString() + 'ms' : '–';
        const fmtCls = v => (v !== undefined && v !== null) ? v.toFixed(3) : '–';
        const gcol = g => g === 'good' ? 'var(--good)' : g === 'warn' ? 'var(--warn)' : g === 'poor' ? 'var(--poor)' : 'var(--muted)';
        const vgrade = (v, good, warn) => v === undefined ? '' : v <= good ? 'good' : v <= warn ? 'warn' : 'poor';
        const lcpG = ms => !ms ? 'poor' : ms <= 2500 ? 'good' : ms <= 4000 ? 'warn' : 'poor';
        const bestLcp = p => { const l = (p.results ?? []).map(r => r.vitals?.lcp).filter(Boolean); return l.length ? Math.min(...l) : undefined; };

        // ── WebSocket ─────────────────────────────────────────────────────────────
        function connect() {
            const ws = new WebSocket(`ws://${location.host}`);
            ws.onopen = () => document.getElementById('cm').textContent = 'Connected — waiting for audit';
            ws.onmessage = e => {
                const m = JSON.parse(e.data);
                if (m.type === 'init' || m.type === 'urls') {
                    if (m.profiles) profiles = m.profiles;
                    if (m.urls) { totalUrls = m.urls.length; m.urls.forEach(u => S.set(u, { url: u, status: 'pending' })); }
                    if (m.progress) m.progress.forEach(p => S.set(p.url, p));
                    renderAll();
                }
                if (m.type === 'progress') {
                    const prog = m.progress;
                    S.set(prog.url, prog);
                    updateRow(prog.url);
                    updateHdr();
                    if (selUrl === prog.url) {
                        // If page just finished and we were showing LIVE, swap to video smoothly
                        if ((prog.status === 'done' || prog.status === 'failed') && prog.results?.length) {
                            const activeId2 = selTab ?? profiles[0]?.id;
                            const finishedResult = prog.results.find(r => r.profile?.id === activeId2);
                            if (finishedResult?.videoPath) {
                                trySwapLiveToVideo(prog.url, finishedResult);
                                // Then re-render rest of detail (vitals, API table) without touching the frame
                                setTimeout(() => renderDetail(selUrl), 350);
                            } else {
                                renderDetail(selUrl);
                            }
                        } else {
                            renderDetail(selUrl);
                        }
                    }
                }
                if (m.type === 'screenshot') {
                    const ex = shots.get(m.url) ?? {}; ex[m.profileId] = m.png; shots.set(m.url, ex);
                    if (selUrl === m.url && selTab === m.profileId) {
                        const img = document.getElementById('live-img');
                        if (img) { img.src = 'data:image/jpeg;base64,' + m.png; img.style.opacity = '1'; }
                    }
                }
                if (m.type === 'done') { updateHdr(); if (!selUrl) document.getElementById('detail').innerHTML = '<div class="de"><div class="big">✅</div><div>Audit complete</div></div>'; }
            };
            ws.onclose = () => setTimeout(connect, 2000);
        }
        connect();

        // ── Sidebar ───────────────────────────────────────────────────────────────
        function pdots(p) {
            if (!profiles.length) return '';
            return '<div class="rp">' + profiles.map(pr => {
                const r = p.results?.find(r => r.profile?.id === pr.id);
                const cls = r ? lcpG(r.vitals?.lcp) : (p.status === 'running' ? 'running' : '');
                return `<span class="rd ${cls}" title="${pr.label}"></span>`;
            }).join('') + '</div>';
        }
        function mkRow(p) {
            const lcp = bestLcp(p);
            const lc = lcp ? gcol(lcpG(lcp)) : 'var(--muted)';
            return `<div class="ur ${p.status}" data-url="${p.url}" onclick="sel(this.dataset.url)">
    <span class="sd ${p.status}"></span>
    <span class="up" title="${p.url}">${pathOf(p.url)}</span>
    ${pdots(p)}
    ${lcp ? `<span style="font-family:var(--mono);font-size:9px;color:${lc};flex-shrink:0">${fmtMs(lcp)}</span>` : ''}
  </div>`;
        }
        function renderAll() {
            document.getElementById('ul').innerHTML = [...S.values()].map(mkRow).join('');
            applyFilter(); updateHdr();
            if (S.size && !selUrl) document.getElementById('detail').innerHTML = '<div class="de"><div class="big">📡</div><div style="color:var(--text)">Click any URL to inspect</div></div>';
        }
        function updateRow(url) {
            const p = S.get(url);
            const el = document.querySelector(`.ur[data-url="${CSS.escape(url)}"]`);
            if (!el) { document.getElementById('ul').insertAdjacentHTML('beforeend', mkRow(p)); return; }
            const t = document.createElement('div'); t.innerHTML = mkRow(p);
            const nr = t.firstElementChild;
            if (selUrl === url) nr.classList.add('selected');
            el.replaceWith(nr); applyFilter();
        }
        function updateHdr() {
            const v = [...S.values()];
            const done = v.filter(p => p.status === 'done').length;
            const fail = v.filter(p => p.status === 'failed').length;
            const run = v.filter(p => p.status === 'running').length;
            const tot = totalUrls || S.size;
            document.getElementById('hd').textContent = `${done} done`;
            document.getElementById('hf').textContent = `${fail} failed`;
            document.getElementById('hr').textContent = `${run} running`;
            document.getElementById('ht').textContent = `${done + fail}/${tot}`;
            document.getElementById('pb').style.width = tot ? ((done + fail) / tot * 100).toFixed(1) + '%' : '0%';
        }
        function setFilter(m, btn) { filterMode = m; document.querySelectorAll('.fb').forEach(b => b.classList.remove('active')); btn.classList.add('active'); applyFilter(); }
        function applyFilter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.ur').forEach(row => {
                const url = row.dataset.url; const p = S.get(url); if (!p) return;
                const ms = !q || url.toLowerCase().includes(q);
                let mf = true;
                if (filterMode === 'running') mf = p.status === 'running';
                if (filterMode === 'failed') mf = p.status === 'failed';
                if (filterMode === 'poor') { const l = bestLcp(p); mf = (!!l && l > 4000) || p.status === 'failed'; }
                row.style.display = ms && mf ? '' : 'none';
            });
        }

        // ── Detail ────────────────────────────────────────────────────────────────
        function sel(url) {
            selUrl = url;
            document.querySelectorAll('.ur').forEach(r => r.classList.remove('selected'));
            const row = document.querySelector(`.ur[data-url="${CSS.escape(url)}"]`);
            if (row) { row.classList.add('selected'); row.scrollIntoView({ block: 'nearest' }); }
            const p = S.get(url);
            selTab = p?.results?.[0]?.profile?.id ?? (profiles[0]?.id ?? null);
            renderDetail(url);
        }
        function selTab2(id) { selTab = id; renderDetail(selUrl); }

        // ── Device frame builders ─────────────────────────────────────────────────
        // ── frameHtml: renders screenshot OR video inside device frame ───────────
        // mode: 'live' (screenshot stream) | 'video' (final recording)
        function frameHtml(profile, url, opts = {}) {
            const ft = profile.frameType ?? 'desktop';
            const { mode = 'live', shot = null, vidSrc = null, vidMime = 'video/webm', liveId = null } = opts;

            const shortUrl = url.replace(/^https?:\/\//, '').slice(0, 58);
            const domain = (() => { try { return new URL(url).hostname; } catch { return url; } })();

            // ── Inner screen content ─────────────────────────────────────────────
            let screenContent;
            if (mode === 'video' && vidSrc) {
                // Final video playback — fills the screen slot
                screenContent = `
      <video id="frame-video" controls preload="metadata" style="background:#000">
        <source src="${vidSrc}" type="${vidMime}">
      </video>`;
            } else {
                // Live screenshot or static final shot
                const src = shot ? `data:image/jpeg;base64,${shot}` : '';
                const opacity = shot ? '1' : '0';
                const shimmer = !shot ? '<div class="loading-shimmer"></div>' : '';
                const liveBadge = mode === 'live'
                    ? `<div class="live-badge"><span class="live-dot"></span>LIVE</div>${shimmer}`
                    : '';
                screenContent = `
      <img ${liveId ? `id="${liveId}"` : ''} src="${src}"
        style="opacity:${opacity};transition:opacity .2s;">
      ${liveBadge}`;
            }

            // ── iPhone frame ─────────────────────────────────────────────────────
            if (ft === 'iphone') {
                return `
    <div class="frame-area">
      <div style="position:relative;flex-shrink:0">
        <div class="iphone-body">
          <div class="iphone-notch">
            <div style="width:52px;height:14px;background:#0a0a0c;border-radius:0 0 10px 10px;
              display:flex;align-items:center;justify-content:center;gap:5px">
              <div style="width:9px;height:9px;background:#1a1a1e;border-radius:50%;border:1.5px solid #2a2a2e"></div>
            </div>
          </div>
          <div class="iphone-statusbar">
            <span style="font-size:8px;font-weight:600">9:41</span>
            <div style="display:flex;gap:3px;align-items:center">
              <span style="font-size:7px">●●●●</span>
              <span style="font-size:7px">WiFi</span>
              <span style="font-size:8px">⬛</span>
            </div>
          </div>
          <div class="iphone-screen">
            ${screenContent}
          </div>
          <div class="iphone-homearea">
            <div class="iphone-bar"></div>
          </div>
        </div>
        <div class="iphone-btn-right top"></div>
        <div class="iphone-btn-right mid"></div>
        <div class="iphone-btn-left vol1"></div>
        <div class="iphone-btn-left vol2"></div>
        <div class="iphone-btn-left mute"></div>
      </div>
    </div>`;
            }

            // ── Android (Pixel) frame ─────────────────────────────────────────────
            if (ft === 'android') {
                return `
    <div class="frame-area">
      <div style="position:relative;flex-shrink:0">
        <div class="android-body">
          <div class="android-topbar">
            <div class="android-cam"></div>
            <div style="display:flex;gap:3px;align-items:center;margin-left:auto">
              <span style="font-size:7px;color:rgba(255,255,255,.5)">●●●●</span>
              <span style="font-size:7px;color:rgba(255,255,255,.5)">WiFi</span>
              <span style="font-size:8px;color:rgba(255,255,255,.5)">9:41</span>
            </div>
          </div>
          <div class="android-screen">
            ${screenContent}
          </div>
          <div class="android-nav">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <div style="width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4)"></div>
            <div style="width:10px;height:8px;border:1.5px solid rgba(255,255,255,.4);border-radius:2px"></div>
          </div>
        </div>
        <div class="android-btn-right pwr"></div>
        <div class="android-btn-right vol"></div>
      </div>
    </div>`;
            }

            // ── macOS Safari frame ────────────────────────────────────────────────
            if (ft === 'macbook') {
                return `
    <div class="frame-desktop mac">
      <div class="mac-chrome">
        <div class="mac-titlebar">
          <div class="mac-dots">
            <span class="d-close"></span><span class="d-min"></span><span class="d-max"></span>
          </div>
          <div class="mac-tabs">
            <div class="mac-tab active">
              <span class="mac-tab-title">${domain}</span>
              <span class="mac-tab-close">✕</span>
            </div>
            <span class="mac-new-tab">+</span>
          </div>
          <div style="width:60px"></div>
        </div>
        <div class="mac-toolbar">
          <div class="mac-navbtns"><span>‹</span><span>›</span></div>
          <div class="mac-urlbar">
            <span style="font-size:9px;color:rgba(255,255,255,.3)">🔒</span>
            <span style="flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${shortUrl}</span>
            <span style="font-size:9px;color:rgba(255,255,255,.2);cursor:pointer">↺</span>
          </div>
          <div class="mac-actions">
            <span>⤡</span><span>⊕</span>
          </div>
        </div>
      </div>
      <div class="browser-screen" style="position:relative;overflow:hidden">
        ${screenContent}
      </div>
      <div class="mac-stand-neck"></div>
      <div class="mac-stand-base"></div>
    </div>`;
            }

            // ── Windows Chrome frame ──────────────────────────────────────────────
            return `
    <div class="frame-desktop win">
      <div class="win-chrome">
        <div class="win-titlebar">
          <div class="win-tabstrip">
            <div class="win-tab active">
              <div class="win-favicon"></div>
              <span class="win-tab-title">${domain}</span>
              <span class="win-tab-x">✕</span>
            </div>
            <span class="win-newtab">+</span>
          </div>
          <div class="win-winctrls">
            <span class="wc-btn">&#x2015;</span>
            <span class="wc-btn">&#x2610;</span>
            <span class="wc-btn close">&#x2715;</span>
          </div>
        </div>
        <div class="win-toolbar">
          <div class="win-navbtns">
            <span class="nb">‹</span><span class="nb">›</span><span class="nb" style="font-size:10px">↻</span>
          </div>
          <div class="win-urlbar">
            <span style="font-size:9px;color:rgba(255,255,255,.3);flex-shrink:0">🔒</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:10px;color:rgba(255,255,255,.65)">${shortUrl}</span>
            <span style="font-size:9px;color:rgba(255,255,255,.2);flex-shrink:0">★</span>
          </div>
          <div class="win-extbtns">
            <span>⋮</span>
          </div>
        </div>
      </div>
      <div class="browser-screen" style="position:relative;overflow:hidden">
        ${screenContent}
      </div>
    </div>`;
        }

        // ── Seamlessly swap LIVE screenshot → video when page finishes ───────────
        // Called from the progress handler when status flips to 'done' and a
        // videoPath is now present — avoids full re-render flicker.
        function trySwapLiveToVideo(url, result) {
            if (selUrl !== url) return;         // user is looking at a different URL
            const frameVideo = document.getElementById('frame-video');
            const liveImg = document.getElementById('live-img');
            if (!result?.videoPath || (!liveImg && !frameVideo)) return;

            const vidFile = result.videoPath.split(/[/\\]/).pop();
            const vidMime = vidFile.endsWith('.mp4') ? 'video/mp4' : 'video/webm';
            const vidSrc = `/videos/${encodeURIComponent(vidFile)}`;

            // If video element already injected, just update src
            if (frameVideo) {
                frameVideo.querySelector('source').src = vidSrc;
                frameVideo.load();
                return;
            }

            // Replace the live <img> with a <video> in-place
            if (liveImg) {
                const screen = liveImg.parentElement;
                // Fade out img
                liveImg.style.transition = 'opacity .3s';
                liveImg.style.opacity = '0';
                setTimeout(() => {
                    // Remove LIVE badge and shimmer
                    screen.querySelectorAll('.live-badge,.loading-shimmer').forEach(el => el.remove());
                    // Insert video
                    const vid = document.createElement('video');
                    vid.id = 'frame-video';
                    vid.controls = true;
                    vid.autoplay = false;
                    vid.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;background:#000;opacity:0;transition:opacity .3s';
                    const src = document.createElement('source');
                    src.src = vidSrc;
                    src.type = vidMime;
                    vid.appendChild(src);
                    screen.replaceChild(vid, liveImg);
                    requestAnimationFrame(() => { vid.style.opacity = '1'; });
                }, 300);
            }
        }

        // ── Render detail ─────────────────────────────────────────────────────────
        function renderDetail(url) {
            if (!url) return;
            const p = S.get(url); if (!p) return;
            const detail = document.getElementById('detail');

            if (p.status === 'pending') {
                detail.innerHTML = `<div class="di"><div class="de" style="height:60vh"><div class="big">⏳</div><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">${url}</div><div>Queued</div></div></div>`;
                return;
            }

            const profs = profiles.length ? profiles : (p.results ?? []).map(r => r.profile).filter(Boolean);
            const activeId = selTab ?? profs[0]?.id;
            const activeResult = p.results?.find(r => r.profile?.id === activeId);
            const activeProfile = profs.find(pr => pr.id === activeId);

            // Tabs
            const tabsHtml = profs.map(pr => {
                const res = p.results?.find(r => r.profile?.id === pr.id);
                const grade = res ? lcpG(res.vitals?.lcp) : (p.status === 'running' ? 'running' : '');
                const active = activeId === pr.id ? 'active' : '';
                const eng = res?.engine ? `<span class="dtab-eng">${res.engine}</span>` : '';
                return `<div class="dtab ${active}" onclick="selTab2('${pr.id}')">${pr.icon} ${pr.label}${eng}<span class="dtab-dot ${grade}"></span></div>`;
            }).join('');

            // Compare bar
            const allLcps = (p.results ?? []).map(r => r.vitals?.lcp ?? 0);
            const maxLcp = Math.max(...allLcps, 1);
            const cmpHtml = profs.map(pr => {
                const res = p.results?.find(r => r.profile?.id === pr.id);
                const lcp = res?.vitals?.lcp ?? 0;
                const g = lcpG(lcp);
                const pct = lcp ? (lcp / maxLcp * 100).toFixed(1) : 0;
                return `<div class="cmprow">
      <span class="cmplbl">${pr.icon} ${pr.label}</span>
      <div class="cmptrack"><div class="cmpfill" style="width:${pct}%;background:${gcol(g)}"></div></div>
      <span class="cmpval" style="color:${gcol(g)}">${fmtMs(lcp)}</span>
    </div>`;
            }).join('');

            // Active tab content
            const isLive = !activeResult && p.status === 'running';
            const urlShots = shots.get(url) ?? {};
            const curShot = urlShots[activeId];

            let frameSection = '';
            if (activeProfile && isLive) {
                frameSection = frameHtml(activeProfile, url, { mode: 'live', shot: curShot || null, liveId: 'live-img' });
            }

            let tabContent = '';

            if (isLive) {
                // Show partial vitals if this profile already has some results (mid-run)
                const partialResult = p.results?.find(r => r.profile?.id === activeId);
                const pv = partialResult?.vitals ?? {};
                const liveVitals = [
                    { l: 'LCP', v: pv.lcp, f: fmtMs, g: 2500, w: 4000 },
                    { l: 'CLS', v: pv.cls, f: fmtCls, g: .1, w: .25 },
                    { l: 'FCP', v: pv.fcp, f: fmtMs, g: 1800, w: 3000 },
                    { l: 'TTFB', v: pv.ttfb, f: fmtMs, g: 800, w: 1800 },
                ];
                const liveVHtml = liveVitals.map(it => {
                    const gr = it.v !== undefined ? vgrade(it.v, it.g, it.w) : '';
                    const co = gcol(gr);
                    const val = it.v !== undefined ? it.f(it.v) : '<span style="color:var(--muted);font-size:14px">…</span>';
                    return `<div class="vc"><div class="vl">${it.l}</div><div class="vv" style="color:${co}">${val}</div></div>`;
                }).join('');
                tabContent = `
      ${frameSection}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px" id="live-vitals-grid">
        ${liveVHtml}
      </div>
      <div style="color:var(--muted);font-size:10px;font-family:var(--mono);text-align:center;padding:4px 0 8px">
        📡 Live capture · screenshots every 800ms
      </div>`;

            } else if (activeResult) {
                const v = activeResult.vitals ?? {};
                const vi = [
                    { l: 'LCP', v: v.lcp, f: fmtMs, g: 2500, w: 4000, s: 'Largest Contentful Paint' },
                    { l: 'CLS', v: v.cls, f: fmtCls, g: .1, w: .25, s: 'Cumulative Layout Shift' },
                    { l: 'FCP', v: v.fcp, f: fmtMs, g: 1800, w: 3000, s: 'First Contentful Paint' },
                    { l: 'TTFB', v: v.ttfb, f: fmtMs, g: 800, w: 1800, s: 'Time To First Byte' },
                    { l: 'Load', v: v.totalTime, f: fmtMs, g: 3000, w: 6000, s: 'Total Load Time' },
                ];
                const vhtml = vi.map(it => {
                    const gr = it.v !== undefined ? vgrade(it.v, it.g, it.w) : '';
                    const c = gcol(gr);
                    return `<div class="vc"><div class="vl">${it.l}</div><div class="vv" style="color:${c}">${it.f(it.v)}</div><div class="vs">${it.s}</div>${gr ? `<div class="vgrade g${gr[0]}">${gr}</div>` : ''}</div>`;
                }).join('');

                const apis = activeResult.apiCalls ?? [];
                const ssrN = apis.filter(a => a.type === 'ssr').length;
                const csrN = apis.filter(a => a.type === 'csr').length;
                const arows = apis.map(a => {
                    const tag = a.type === 'ssr' ? '<span class="tag ssr">SSR</span>' : '<span class="tag csr">CSR</span>';
                    const st = a.status ? `<span class="${a.status >= 400 ? 'serr' : 'sok'}">${a.status}</span>` : '<span style="color:var(--muted)">–</span>';
                    const mc = a.duration <= 300 ? 'var(--good)' : a.duration <= 1000 ? 'var(--warn)' : 'var(--poor)';
                    const stxt = a.serverTiming ? `<span class="stxt">${a.serverTiming}</span>` : '';
                    return `<tr><td class="ct">${tag}</td><td class="cu tdu" title="${a.url}">${a.url}</td><td class="cs" style="text-align:center">${st}</td><td class="cm" style="text-align:right;font-family:var(--mono);color:${mc}">${fmtMs(a.duration)}</td><td class="cst">${stxt}</td></tr>`;
                }).join('');

                const errHtml = activeResult.errors?.length ? `
      <div class="sec"><div class="sechd" style="border-color:rgba(240,67,90,.3)">Console errors<span class="meta">${activeResult.errors.length}</span></div>
      <div class="erl">${activeResult.errors.map(e => `<div class="eri">${e}</div>`).join('')}</div></div>` : '';

                const vidFile = activeResult.videoPath ? activeResult.videoPath.split(/[/\\]/).pop() : null;
                const vidMime = vidFile?.endsWith('.mp4') ? 'video/mp4' : 'video/webm';
                const vidSrc = vidFile ? `/videos/${encodeURIComponent(vidFile)}` : null;

                // Video goes INSIDE the device frame — pass vidSrc to frameHtml
                const recordingFrame = (activeProfile && vidSrc)
                    ? frameHtml(activeProfile, url, { mode: 'video', vidSrc, vidMime })
                    : '';

                // Final screenshot frame (static, no live badge)
                const finalShotFrame = (activeProfile && curShot && !vidSrc)
                    ? frameHtml(activeProfile, url, { mode: 'static', shot: curShot })
                    : '';

                const hb = activeResult.status ? `<span class="${activeResult.status >= 400 ? 'herr' : 'hok'}">${activeResult.status}</span>` : '';

                tabContent = `
      ${activeResult.error ? `<div class="errb">⚠ ${activeResult.error}</div>` : ''}
      ${recordingFrame || finalShotFrame}
      <div class="vg">${vhtml}</div>
      ${apis.length ? `<div class="sec"><div class="sechd">API calls<span class="meta">SSR:${ssrN} · CSR:${csrN}</span></div>
      <div class="tbwrap"><table><thead><tr><th class="ct">Type</th><th class="cu">URL</th><th class="cs">Status</th><th class="cm">Time</th><th class="cst">Server-Timing</th></tr></thead>
      <tbody>${arows}</tbody></table></div></div>` : ''}
      ${errHtml}`;
            } else {
                tabContent = `<div style="color:var(--muted);text-align:center;padding:40px;font-size:11px">No data yet</div>`;
            }

            detail.innerHTML = `<div class="di">
    <div class="durl"><a href="${url}" target="_blank" rel="noopener">${url}</a></div>
    <div class="dtabs">${tabsHtml}</div>
    ${profs.length > 1 && p.results?.length ? `<div class="sec" style="margin-bottom:14px">
      <div class="sechd">LCP across devices</div>
      <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 7px 7px;padding:10px 14px">
        <div class="cmpbar">${cmpHtml}</div>
      </div></div>`: ''}
    ${tabContent}
  </div>`;
        }
    </script>
</body>

</html>
