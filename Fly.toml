# Fly.io configuration — https://fly.io/docs/reference/configuration/
app            = "site-audit-tool"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT        = "7331"
  CONCURRENCY = "3"
  VIDEOS_DIR  = "/app/videos"

[http_service]
  internal_port       = 7331
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 2

# Persist videos across deploys
[[mounts]]
  source      = "videos"
  destination = "/app/videos"